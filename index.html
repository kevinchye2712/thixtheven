<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sleek Puzzles | 1000 Piece Jigsaw</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="1000 Piece Jigsaw Puzzle">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="ui-header">
        <div class="logo">PuzzleVault</div>
        <div class="controls">
            <span class="info-text">🧩 1000 Pieces</span>
            <button class="action-btn" id="previewBtn">Preview Image</button>
        </div>
    </header>

    <canvas id="puzzle-canvas"></canvas>

    <!-- Overlay Loading / Settings -->
    <div id="loading-overlay">
        <div class="glass-panel">
            <h1>Preparing 1000 Pieces...</h1>
            <p>Slicing image and calculating beziers.</p>
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Preview Image Modal -->
    <div id="preview-modal" class="hidden">
        <div class="glass-panel preview-panel">
            <span class="close-btn" id="closePreview">&times;</span>
            <img src="LUNALEIA.jpeg" alt="LUNALEIA Target image">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
